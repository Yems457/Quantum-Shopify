<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      
</head>
<body class="bg-gray-300">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Home</a>
    <div class="max-w-6xl mx-auto p-6 lg:py-12">
        <h1 class="text-3xl font-bold mb-8 text-gray-900">Checkout</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- Left Column: Shipping & Payment -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Shipping Information -->
                <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-300">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">Shipping Information</h2>
                    <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" placeholder="First Name" class="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" placeholder="Last Name" class="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="email" placeholder="Email Address" class="md:col-span-2 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" placeholder="Address" class="md:col-span-2 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" placeholder="City" class="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" placeholder="ZIP Code" class="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </form>
                </section>

                <!-- Payment Method -->
                <section class="bg-white p-6 rounded-lg shadow-sm border border-gray-300">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">Payment Details</h2>
                    <div class="space-y-4">
                        <input type="text" placeholder="Card Number" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" placeholder="MM/YY" class="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            <input type="text" placeholder="CVC" class="p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right Column: Order Summary -->
            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-300 h-fit">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Order Summary</h2>
                <div class="space-y-4">
                    <div class="flex justify-between text-gray-600">
                        <span>Subtotal</span>
                        <span>$99.00</span>
                    </div>
                    <div class="flex justify-between text-gray-600">
                        <span>Shipping</span>
                        <span class="text-green-600 font-medium">Free</span>
                    </div>
                    <div class="flex justify-between text-gray-600">
                        <span>Tax</span>
                        <span>$8.25</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold border-t pt-4 text-gray-900">
                        <span>Total</span>
                        <span>$107.25</span>
                    </div>
                </div>
                <button class="w-full mt-6 bg-yellow-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                    Place Order
                </button>
            </div>
        </div>
    </div>
</body>
</html>
